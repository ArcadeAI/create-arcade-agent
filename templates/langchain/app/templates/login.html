{% extends "base.html" %} {% block title %}Login - Arcade Agent{% endblock %} {% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center gap-3 mb-8">
      <svg width="40" height="41" viewBox="0 0 309 315" fill="currentColor" aria-hidden="true">
        <path
          d="M267.074 293.931L266.955 0L231.402 15.9321L45.0407 294.83L9.86791 299.653L0 314.989H98.1906L109.035 299.653L72.3429 293.963L109.535 234.191L171.521 206.478C177.611 203.757 184.212 202.348 190.877 202.348H221.339L221.306 212.98V213.024L221.089 293.974L191.843 298.266L180.705 315H296.993L308.25 298.212M171.293 187.977L125.145 209.176L221.86 60L221.881 86.3042L221.382 158.996L221.339 183.685L190.063 183.652C183.202 183.652 177.514 185.116 171.293 187.977Z"
        />
      </svg>
      <span class="text-xl font-semibold tracking-tight">Arcade Agent</span>
    </div>

    <div
      class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl p-6 shadow-sm"
    >
      <!-- Tab switcher -->
      <div class="mb-4 flex rounded-lg bg-gray-100 dark:bg-gray-800 p-1">
        <button
          type="button"
          id="tab-register"
          onclick="setMode(true)"
          class="flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 shadow-sm"
        >
          Create account
        </button>
        <button
          type="button"
          id="tab-signin"
          onclick="setMode(false)"
          class="flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"
        >
          Sign in
        </button>
      </div>

      <p class="text-sm text-gray-500 dark:text-gray-400 mb-5" id="form-subtitle">
        Get started with Arcade Agent
      </p>

      <form id="auth-form" class="space-y-4">
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-300"
        />
        <input
          type="password"
          id="password"
          placeholder="Your password"
          required
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-300"
        />

        <p id="error-msg" class="text-sm text-red-600 dark:text-red-400 hidden"></p>

        <button
          type="submit"
          id="submit-btn"
          class="w-full py-2 bg-gray-900 hover:bg-gray-700 dark:bg-white dark:hover:bg-gray-200 text-white dark:text-gray-900 font-medium rounded-md disabled:opacity-50 transition-colors"
        >
          Create account
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script>
  let isRegister = true;

  function setMode(register) {
    isRegister = register;

    // Update subtitle
    document.getElementById("form-subtitle").textContent = register
      ? "Get started with Arcade Agent"
      : "Welcome back to Arcade Agent";

    // Update submit button
    document.getElementById("submit-btn").textContent = register ? "Create account" : "Sign in";

    // Update tab appearance
    const activeClasses =
      "bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 shadow-sm";
    const inactiveClasses =
      "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100";

    const tabRegister = document.getElementById("tab-register");
    const tabSignin = document.getElementById("tab-signin");

    tabRegister.className = `flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${register ? activeClasses : inactiveClasses}`;
    tabSignin.className = `flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${!register ? activeClasses : inactiveClasses}`;

    document.getElementById("error-msg").classList.add("hidden");
    document.getElementById("auth-form").reset();
  }

  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorMsg = document.getElementById("error-msg");
    const submitBtn = document.getElementById("submit-btn");
    errorMsg.classList.add("hidden");
    submitBtn.disabled = true;
    submitBtn.textContent = "Loading...";

    const endpoint = isRegister ? "/api/auth/register" : "/api/auth/login";
    try {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorMsg.textContent = data.error || "Something went wrong";
        errorMsg.classList.remove("hidden");
        return;
      }
      window.location.href = "/dashboard";
    } catch {
      errorMsg.textContent = "Network error. Please try again.";
      errorMsg.classList.remove("hidden");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = isRegister ? "Create account" : "Sign in";
    }
  });
</script>
{% endblock %}
