[environment]
python-version = "3.12"

[rules]
# Pydantic models use dynamic constructors with aliases (e.g. `model` vs `model_name`)
# that ty doesn't resolve yet. SQLAlchemy Column types also cause false positives.
unknown-argument = "ignore"
missing-argument = "ignore"
invalid-argument-type = "ignore"
# ty doesn't narrow types through hasattr() or isinstance+continue patterns
no-matching-overload = "ignore"
not-iterable = "ignore"
