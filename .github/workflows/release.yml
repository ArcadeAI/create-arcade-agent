name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Publish
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(bun -e "process.stdout.write(require('./package.json').version)")
          REMOTE=$(bun -e "const r = await fetch('https://registry.npmjs.org/@arcadeai/create-agent/latest'); process.stdout.write((await r.json()).version)" 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: bun run build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        run: gh release create "v${{ steps.version.outputs.local }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
